name: bismart_flutter
description: "Bi'S MART - Hệ thống quản lý chuỗi cửa hàng dinh dưỡng"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.2

  # HTTP & API
  dio: ^5.4.3

  # Charts (Bar chart, Line chart)
  fl_chart: ^0.66.2

  # Calendar
  table_calendar: ^3.0.9

  # Google Maps
  google_maps_flutter: ^2.6.0

  # Image caching
  cached_network_image: ^3.3.1

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Export báo cáo
  pdf: ^3.10.8
  excel: ^4.0.2
  path_provider: ^2.1.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  video_player: ^2.8.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
