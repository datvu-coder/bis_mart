server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML, manifest, and bootstrap: never cache (always fetch fresh)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Hashed assets (fonts, images, canvaskit, etc.) can be cached long-term
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
}
