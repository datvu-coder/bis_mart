databases:
  - name: bismart-db
    plan: free

services:
  - type: web
    name: bismart-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bismart-db
          property: connectionString
      - key: SEED_ADMIN_USERNAME
        value: admin
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
